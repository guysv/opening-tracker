name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  deployments: write # Cloudflare wrangler-action can create GitHub deployment entries

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Build
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          # Tag builds: map deployment to production branch so opening-tracker.pages.dev updates.
          command: pages deploy dist --project-name=opening-tracker --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Package dist as tar.gz
        run: |
          tar -czf "opening-tracker-dist-${GITHUB_REF_NAME}.tar.gz" dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            opening-tracker-dist-${{ github.ref_name }}.tar.gz
