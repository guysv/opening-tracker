name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Build
        run: bun run build

      - name: Package dist as tar.gz
        run: |
          tar -czf "opening-tracker-dist-${GITHUB_SHA}.tar.gz" dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: opening-tracker-dist-${{ github.sha }}
          path: opening-tracker-dist-${{ github.sha }}.tar.gz
          if-no-files-found: error
